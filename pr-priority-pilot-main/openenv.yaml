name: pr-priority-pilot
version: "1.0"
description: Code review prioritizer with 3 tasks
actions:
  type: Discrete
  n: 3
observations:
  pr_title: string
  pr_description: string
  files_changed: int
  labels: list
  author: string
tasks:
  - name: easy
    grader:
      type: reward
      range: (0, 1)
  - name: medium
    grader:
      type: reward
      range: (0, 1)
  - name: hard
    grader:
      type: reward
      range: (0, 1)
endpoints:
  reset: /reset
  step: /step
  state: /state
